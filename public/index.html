
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FazzPay Receipt Generator - Premium Fintech Tool</title>
  <!-- Integrasi Tailwind CSS & Font Inter -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #0B0F14;
      color: #EAF2FF;
      letter-spacing: -0.02em;
    }
    .fintech-blur {
      background: rgba(18, 24, 33, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
    }
    .accent-glow:focus {
      outline: none;
      border-color: #00C896;
      box-shadow: 0 0 14px rgba(0, 200, 150, 0.25);
    }
    /* Kustomisasi scrollbar halus untuk panel template */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Animasi shimmer loader */
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    .shimmer-bg {
      position: relative;
      overflow: hidden;
      background-color: rgba(255, 255, 255, 0.05);
    }
    .shimmer-bg::after {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      transform: translateX(-100%);
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.08) 20%,
        rgba(255, 255, 255, 0.15) 60%,
        rgba(255, 255, 255, 0) 100%
      );
      animation: shimmer 1.6s infinite;
      content: '';
    }
    /* Animasi centang sukses */
    @keyframes stroke {
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scale {
      0%, 100% { transform: none; }
      50% { transform: scale3d(1.1, 1.1, 1); }
    }
    @keyframes fill {
      100% { box-shadow: inset 0px 0px 0px 30px #00C896; }
    }
    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #00C896;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }
    .checkmark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #fff;
      stroke-miterlimit: 10;
      margin: 10% auto;
      box-shadow: inset 0px 0px 0px #00C896;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s backwards;
    }
    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }
  </style>
</head>
<body class="min-h-screen pb-16">

  <!-- Header Lekat dengan Efek Blur Transparan -->
  <header class="sticky top-0 z-50 w-full fintech-blur border-b border-white/[0.06] py-4 px-6 mb-6">
    <div class="max-w-[420px] mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Logo SVG Premium Fintech -->
        <svg class="w-8 h-8 text-[#00C896]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span class="font-bold text-xl tracking-tight text-white">FazzPay <span class="text-[#00C896] text-xs px-2 py-0.5 rounded-full bg-[#00C896]/10 font-medium">Pic</span></span>
      </div>
      <a href="/docs.html" class="text-xs text-[#8FA3BF] hover:text-[#00C896] transition-colors border border-white/10 px-3 py-1.5 rounded-full bg-white/[0.02]">API Docs</a>
    </div>
  </header>

  <!-- Container Utama Form Maker & Preview (Sangat optimal untuk tampilan Smartphone) -->
  <main class="max-w-[420px] mx-auto px-4 space-y-6">

    <!-- Form Kontrol Utama -->
    <div class="bg-[#121821] rounded-2xl border border-white/[0.06] p-5 space-y-5">
      <div>
        <h2 class="text-lg font-semibold text-white">Buat Struk Transaksi</h2>
        <p class="text-xs text-[#8FA3BF]">Isi parameter transaksi resmi di bawah untuk merender struk.</p>
      </div>

      <div class="space-y-4">
        <!-- Input nominal uang -->
        <div>
          <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Nominal Transfer (Format Uang)</label>
          <input type="text" id="amount" placeholder="Rp 1.500.000,00" value="Rp 500.000,00" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 accent-glow text-sm">
        </div>

        <!-- Detail Produk -->
        <div>
          <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Nama Produk / Keperluan</label>
          <input type="text" id="productName" placeholder="Pembelian Hosting Premium" value="Top Up Saldo E-Wallet" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 accent-glow text-sm">
        </div>

        <!-- Blok Pengirim -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Nama Pengirim</label>
            <input type="text" id="buyerName" placeholder="John Doe" value="Fazz Ganteng" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Username Pengirim</label>
            <input type="text" id="buyerUsername" placeholder="@john" value="@fazzganteng" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
        </div>

        <!-- Blok Penerima -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Nama Penerima</label>
            <input type="text" id="ownerName" placeholder="Jane Doe" value="Toko Serba Ada" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Username Penerima</label>
            <input type="text" id="ownerUsername" placeholder="@jane" value="@tokoserba" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
        </div>

        <!-- Detail ID Transaksi & Waktu -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">ID Transaksi</label>
            <input type="text" id="transactionId" placeholder="TX908129" value="FP-2026-88019" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
          <div>
            <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Waktu & Tanggal</label>
            <input type="text" id="dateTime" placeholder="01 Jul 2026, 16:00" value="01 Jul 2026, 16:02" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl px-3 py-2.5 text-white placeholder-white/20 accent-glow text-xs">
          </div>
        </div>

        <!-- Kunci API -->
        <div>
          <label class="block text-xs font-medium text-[#8FA3BF] mb-1.5">Kunci API Terenkripsi</label>
          <div class="relative">
            <input type="password" id="apiKey" value="fazzganzz" class="w-full bg-[#0B0F14] border border-white/10 rounded-xl pl-4 pr-10 py-3 text-white placeholder-white/20 accent-glow text-sm">
            <button type="button" onclick="toggleApiKey()" class="absolute inset-y-0 right-3 flex items-center text-[#8FA3BF] hover:text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" id="eye-icon">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Pemilih Template Desain Terintegrasi (Horizontal Scrolling) -->
      <div class="space-y-2 pt-2">
        <label class="block text-xs font-medium text-[#8FA3BF]">Pilih Gaya Kartu Struk</label>
        <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="templateList">
          
          <!-- Template 1 -->
          <div onclick="selectTemplate('minimal', this)" class="flex-shrink-0 w-[110px] bg-[#0B0F14] border-2 border-[#00C896] rounded-xl p-3 cursor-pointer transition-all duration-200">
            <div class="w-full h-12 bg-[#121821] rounded-lg mb-2 flex items-center justify-center">
              <div class="w-4 h-4 rounded-full bg-[#00C896]"></div>
            </div>
            <p class="text-[11px] text-center font-medium text-white">Minimal Clean</p>
          </div>

          <!-- Template 2 -->
          <div onclick="selectTemplate('fintech', this)" class="flex-shrink-0 w-[110px] bg-[#0B0F14] border border-white/5 rounded-xl p-3 cursor-pointer transition-all duration-200 hover:border-white/20">
            <div class="w-full h-12 bg-gradient-to-br from-[#060B11] to-[#0C1522] rounded-lg mb-2 flex items-center justify-center">
              <div class="w-4 h-4 rounded-full bg-[#1E90FF]"></div>
            </div>
            <p class="text-[11px] text-center font-medium text-[#8FA3BF]">Fintech Premium</p>
          </div>

          <!-- Template 3 -->
          <div onclick="selectTemplate('glass', this)" class="flex-shrink-0 w-[110px] bg-[#0B0F14] border border-white/5 rounded-xl p-3 cursor-pointer transition-all duration-200 hover:border-white/20">
            <div class="w-full h-12 bg-gradient-to-r from-[#090E15] via-[#13111C] to-[#05070A] rounded-lg mb-2 flex items-center justify-center">
              <div class="w-4 h-4 rounded-full bg-[#00C896] opacity-60"></div>
            </div>
            <p class="text-[11px] text-center font-medium text-[#8FA3BF]">Dark Glass</p>
          </div>

        </div>
      </div>

      <!-- Tombol Generate Utama -->
      <button onclick="generateReceipt()" id="btnGenerate" class="w-full h-13 mt-4 bg-gradient-to-r from-[#00C896] to-[#029571] text-[#0B0F14] font-semibold text-sm rounded-full flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-[#00C896]/15 active:scale-95 transition-all duration-150">
        <span>Render Struk (PNG)</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </button>
    </div>

    <!-- Kotak Notifikasi Toast Terintegrasi -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[380px] bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-sm text-red-200 flex items-start gap-3 z-50 transition-opacity duration-300">
      <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      <div id="toastMessage">Terjadi kesalahan saat menghubungi API Generator.</div>
    </div>

    <!-- Area Loading Skeleton Shimmer -->
    <div id="loadingBox" class="hidden bg-[#121821] rounded-2xl border border-white/[0.06] p-6 space-y-5 animate-pulse">
      <div class="flex items-center justify-center py-6">
        <div class="w-16 h-16 rounded-full bg-white/5 shimmer-bg"></div>
      </div>
      <div class="h-6 w-2/3 mx-auto rounded bg-white/5 shimmer-bg"></div>
      <div class="h-4 w-1/2 mx-auto rounded bg-white/5 shimmer-bg"></div>
      <div class="space-y-3 pt-6">
        <div class="h-10 rounded bg-white/5 shimmer-bg"></div>
        <div class="h-10 rounded bg-white/5 shimmer-bg"></div>
        <div class="h-10 rounded bg-white/5 shimmer-bg"></div>
      </div>
    </div>

    <!-- Sukses State & Preview Hasil Gambar -->
    <div id="resultBox" class="hidden space-y-5 animate-fade-in">
      <div class="bg-[#121821] rounded-2xl border border-white/[0.06] p-4 text-center">
        <!-- Keberhasilan Rendering -->
        <div class="py-4">
          <div class="checkmark">
            <svg class="w-14 h-14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
              <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
              <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
          </div>
          <h3 class="text-base font-semibold text-[#00C896] mt-2">Render Selesai</h3>
          <p class="text-xs text-[#8FA3BF]">Gambar struk beresolusi tinggi berhasil dibuat</p>
        </div>

        <!-- Frame Preview Gambar -->
        <div class="bg-[#0B0F14] rounded-xl overflow-hidden border border-white/5 relative aspect-[9/16] p-2">
          <img id="receiptImage" src="" alt="FazzPay Digital Receipt" class="w-full h-full object-contain rounded-lg">
        </div>
      </div>

      <!-- Tombol Aksi Download / Simpan -->
      <div class="flex gap-3">
        <button onclick="downloadReceipt()" class="flex-1 h-12 bg-white text-[#0B0F14] rounded-full text-xs font-semibold hover:bg-slate-200 transition-colors flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Unduh PNG
        </button>
        <button onclick="shareReceipt()" class="h-12 w-12 bg-white/5 border border-white/10 rounded-full text-white hover:bg-white/10 transition-colors flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 10.742l4.417-2.209a3 3 0 11.458 1.947L9.142 12.69a3 3 0 11-.458-1.947z"></path></svg>
        </button>
      </div>
    </div>

  </main>

  <script>
    let activeTemplate = "minimal";
    let generatedImageBlobUrl = null;

    // Sembunyikan & Tampilkan Kunci API
    function toggleApiKey() {
      const apiInput = document.getElementById('apiKey');
      const eyeIcon = document.getElementById('eye-icon');
      if (apiInput.type === "password") {
        apiInput.type = "text";
        eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 012.24-4.054M9.73 9.73a3 3 0 004.24 4.24m-1.414-4.24L3 3m18 18l-1.921-1.921"></path>`;
      } else {
        apiInput.type = "password";
        eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
      }
    }

    // Ubah status keaktifan pilihan template secara visual
    function selectTemplate(name, element) {
      activeTemplate = name;
      const list = document.getElementById('templateList').children;
      for (let item of list) {
        item.classList.remove('border-[#00C896]', 'border-2');
        item.classList.add('border-white/5', 'border');
        item.querySelector('p').classList.remove('text-white');
        item.querySelector('p').classList.add('text-[#8FA3BF]');
      }
      element.classList.remove('border-white/5', 'border');
      element.classList.add('border-[#00C896]', 'border-2');
      element.querySelector('p').classList.remove('text-[#8FA3BF]');
      element.querySelector('p').classList.add('text-white');
    }

    // Tampilkan Toast Peringatan Error
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').innerText = message;
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 5000);
    }

    // Generate Struk Pembayaran ke Backend Server
    async function generateReceipt() {
      const apiKey = document.getElementById('apiKey').value;
      const amount = document.getElementById('amount').value;
      const productName = document.getElementById('productName').value;
      const buyerName = document.getElementById('buyerName').value;
      const buyerUsername = document.getElementById('buyerUsername').value;
      const ownerName = document.getElementById('ownerName').value;
      const ownerUsername = document.getElementById('ownerUsername').value;
      const transactionId = document.getElementById('transactionId').value;
      const dateTime = document.getElementById('dateTime').value;

      if (!apiKey) {
        showToast("Mohon isi kunci API FazzPay untuk melanjutkan.");
        return;
      }

      const payload = {
        apiKey,
        amount,
        productName,
        buyerName,
        buyerUsername,
        ownerName,
        ownerUsername,
        transactionId,
        dateTime,
        template: activeTemplate
      };

      // Tampilkan status memproses (loading shimmer)
      document.getElementById('loadingBox').classList.remove('hidden');
      document.getElementById('resultBox').classList.add('hidden');
      document.getElementById('btnGenerate').disabled = true;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.status === 401) {
          showToast("Kunci API salah! Gunakan kunci 'fazzganzz'");
          return;
        }

        if (!response.ok) {
          const errData = await response.json();
          showToast(errData.error || "Gagal menghubungi modul API");
          return;
        }

        const blob = await response.blob();
        if (generatedImageBlobUrl) {
          URL.revokeObjectURL(generatedImageBlobUrl);
        }
        
        generatedImageBlobUrl = URL.createObjectURL(blob);
        document.getElementById('receiptImage').src = generatedImageBlobUrl;

        // Tampilkan kotak sukses setelah delay visual demi kenyamanan pengguna
        setTimeout(() => {
          document.getElementById('loadingBox').classList.add('hidden');
          document.getElementById('resultBox').classList.remove('hidden');
        }, 800);

      } catch (err) {
        showToast("Gangguan koneksi jaringan ke server Vercel.");
        console.error(err);
      } finally {
        document.getElementById('btnGenerate').disabled = false;
        document.getElementById('loadingBox').classList.add('hidden');
      }
    }

    // Handler Pengunduhan Berkas Gambar PNG
    function downloadReceipt() {
      if (!generatedImageBlobUrl) return;
      const a = document.createElement('a');
      a.href = generatedImageBlobUrl;
      a.download = `FazzPay-Receipt-${document.getElementById('transactionId').value}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // Fungsi Share Menggunakan Web Share API
    async function shareReceipt() {
      if (!generatedImageBlobUrl) return;
      try {
        const response = await fetch(generatedImageBlobUrl);
        const blob = await response.blob();
        const file = new File([blob], 'FazzPay-Receipt.png', { type: blob.type });
        
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: 'FazzPay Receipt',
            text: 'Bukti pembayaran digital resmi dari FazzPay'
          });
        } else {
          // Jika tidak didukung, lakukan fallback download langsung
          downloadReceipt();
        }
      } catch (err) {
        console.log("Web Share API tidak didukung atau dibatalkan:", err);
        downloadReceipt();
      }
    }
  </script>
</body>
</html>
